services:
  # Python Backend
  api:
    build: ./backend
    container_name: vector_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app # Syncs your code edits instantly
      - /app/venv # Ignores your local venv folder to avoid errors
    environment:
      - ENV_TYPE=dev

  # Next.js Frontend
  web:
    build:
      context: ./frontend
      target: deps
    container_name: vector_frontend
    ports:
      - "3000:3000"
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      # ADD THESE TWO LINES:
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - api
